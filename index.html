<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>クリニック共有タスク管理</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.2/Sortable.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<style>
  :root {
    --primary:#0D9488;--primary-dark:#0F766E;--primary-light:#CCFBF1;--primary-mid:#5EEAD4;
    --bg:#F0FDFA;--card:#fff;--border:#CCFBF1;--text:#134E4A;--text-muted:#6B7280;
    --danger:#EF4444;--warn:#F59E0B;--success:#10B981;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

  /* Header */
  .header{background:var(--primary);color:#fff;padding:14px 16px 0;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15);}
  .header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .header-top h1{font-size:17px;font-weight:700;}
  .header-actions{display:flex;gap:8px;align-items:center;}
  .sync-dot{width:8px;height:8px;border-radius:50%;background:#6EE7B7;display:inline-block;}
  .sync-dot.syncing{background:#FCD34D;animation:pulse .8s infinite;}
  .sync-dot.error{background:#FCA5A5;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .user-badge{background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:8px;padding:6px 10px;font-size:12px;cursor:pointer;}
  .last-sync{font-size:11px;color:rgba(255,255,255,.65);}

  /* Tabs */
  .tabs{display:flex;gap:2px;padding:0 2px;}
  .tab-btn{flex:1;padding:8px 2px;border:none;background:transparent;color:rgba(255,255,255,.75);font-size:13px;font-weight:600;cursor:pointer;border-radius:8px 8px 0 0;transition:all .2s;white-space:nowrap;}
  .tab-btn.active{background:var(--bg);color:var(--primary);}

  /* Main */
  .main{padding:16px;max-width:700px;margin:0 auto;}

  /* Section headers */
  .section-title{font-size:13px;font-weight:700;color:var(--primary-dark);text-transform:uppercase;letter-spacing:.05em;margin:20px 0 8px;padding-bottom:6px;border-bottom:2px solid var(--primary-light);display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;}
  .section-title:hover{color:var(--primary);}
  .section-title span{font-size:11px;color:var(--text-muted);font-weight:500;text-transform:none;letter-spacing:0;}
  .section-add-btn{margin-left:auto;background:none;border:1.5px dashed var(--primary-mid);color:var(--primary);border-radius:8px;padding:3px 10px;font-size:12px;font-weight:600;cursor:pointer;text-transform:none;letter-spacing:0;}
  .section-add-btn:hover{background:var(--primary-light);}
  .sec-chevron{font-size:10px;color:var(--primary-mid);transition:transform .2s;flex-shrink:0;display:inline-block;}
  .sec-content{transition:opacity .15s;}
  .sec-content.collapsed{display:none;}

  /* Cards */
  .card{background:var(--card);border-radius:12px;border:1px solid var(--border);margin-bottom:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);}
  .card-header{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;user-select:none;}
  .card-header:hover{background:var(--bg);}
  .card-title{font-size:15px;font-weight:700;flex:1;}
  .badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;}
  .badge-teal{background:var(--primary-light);color:var(--primary-dark);}
  .badge-gray{background:#F3F4F6;color:var(--text-muted);}
  .badge-yellow{background:#FEF3C7;color:#92400E;}
  .badge-red{background:#FEE2E2;color:#991B1B;}
  .badge-green{background:#D1FAE5;color:#065F46;}
  .badge-blue{background:#DBEAFE;color:#1E40AF;}
  .progress-bar-wrap{height:4px;background:#E5E7EB;border-radius:2px;margin:0 14px 10px;overflow:hidden;}
  .progress-bar-fill{height:100%;background:var(--primary);border-radius:2px;transition:width .3s;}
  .chevron{font-size:14px;color:var(--text-muted);transition:transform .2s;}
  .chevron.open{transform:rotate(180deg);}

  /* Task items */
  .task-list{padding:0 10px 10px;}
  .task-item{display:flex;align-items:flex-start;gap:10px;padding:9px 6px;border-radius:8px;margin-bottom:4px;position:relative;transition:background .15s;}
  .task-item:hover{background:var(--bg);}
  .task-item.completed{opacity:.55;}
  .task-item.completed .task-name{text-decoration:line-through;}
  .drag-handle{cursor:grab;color:#D1D5DB;font-size:16px;padding:2px;touch-action:none;flex-shrink:0;}
  .drag-handle:active{cursor:grabbing;}
  .status-btn{height:24px;min-width:64px;padding:0 9px;border-radius:20px;border:1.5px solid #D1D5DB;background:#F9FAFB;color:#9CA3AF;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;font-size:11px;font-weight:700;letter-spacing:.02em;gap:3px;white-space:nowrap;}
  .status-btn:hover{border-color:#9CA3AF;background:#F3F4F6;}
  .status-btn::before{content:'○';font-size:11px;}
  .status-btn.in-progress{border-color:var(--warn);background:#FEF3C7;color:#92400E;}
  .status-btn.in-progress::before{content:'▶';color:var(--warn);}
  .status-btn.completed{border-color:var(--success);background:#D1FAE5;color:#065F46;}
  .status-btn.completed::before{content:'✓';color:var(--success);}
  .task-body{flex:1;min-width:0;}
  .task-name{font-size:14px;font-weight:500;word-break:break-word;}
  .task-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;}
  .task-tag-project{font-size:11px;padding:1px 7px;border-radius:8px;background:var(--primary-light);color:var(--primary-dark);font-weight:600;}
  .task-tag-assignee{font-size:11px;padding:1px 7px;border-radius:8px;background:#E0E7FF;color:#3730A3;font-weight:500;}
  .task-tag-due{font-size:11px;padding:1px 7px;border-radius:8px;background:#FEF3C7;color:#92400E;}
  .task-tag-overdue{background:#FEE2E2;color:#991B1B;}
  .task-tag-routine{font-size:11px;padding:1px 7px;border-radius:8px;background:#F3E8FF;color:#6B21A8;font-weight:600;}
  .task-tag-role{font-size:11px;padding:1px 7px;border-radius:8px;background:#FEF3C7;color:#92400E;font-weight:600;}
  .task-tag-freq{font-size:11px;padding:1px 7px;border-radius:8px;background:#F0FDF4;color:#166534;font-weight:600;}
  .task-actions{display:flex;gap:6px;align-items:center;flex-shrink:0;}
  .icon-btn{background:none;border:none;cursor:pointer;color:#9CA3AF;padding:4px;border-radius:6px;font-size:14px;line-height:1;}
  .icon-btn:hover{background:var(--primary-light);color:var(--primary);}
  .task-note{font-size:12px;color:var(--text-muted);margin-top:5px;line-height:1.45;word-break:break-word;padding:4px 8px;background:#F9FAFB;border-radius:6px;border-left:2px solid #E5E7EB;}

  /* Completed section */
  .completed-toggle{width:100%;background:none;border:none;padding:8px 14px;text-align:left;cursor:pointer;font-size:12px;color:var(--text-muted);font-weight:500;display:flex;align-items:center;gap:6px;border-top:1px solid var(--border);}
  .completed-toggle:hover{background:var(--bg);}
  .completed-section{overflow:hidden;transition:max-height .3s ease;}
  .completed-section.hidden{max-height:0 !important;}

  /* Project cards */
  .proj-card{margin-bottom:12px;}
  .proj-header-actions{display:flex;gap:6px;}
  /* ② タスク間のつながり線 */
  .subtask-list{padding:0 10px 8px 32px;position:relative;}
  .subtask-list.connected{border-left:2px solid var(--primary-light);margin-left:20px;padding-left:20px;}
  .subtask-item{display:flex;align-items:flex-start;gap:8px;padding:7px 6px;border-radius:8px;margin-bottom:3px;position:relative;}
  .subtask-list.connected .subtask-item::before{content:'';position:absolute;left:-14px;top:18px;width:12px;height:2px;background:var(--primary-light);}
  .subtask-list.connected .subtask-item:last-child::after{content:'';position:absolute;left:-16px;top:18px;bottom:0;width:2px;background:#fff;}
  .subtask-item:hover{background:var(--bg);}
  .subtask-item.completed{opacity:.55;}
  .subtask-item.completed .task-name{text-decoration:line-through;}
  .subtask-add-row{padding:6px 10px 10px 32px;}
  .subtask-add-btn{display:flex;align-items:center;gap:6px;background:none;border:1.5px dashed var(--primary-mid);color:var(--primary);border-radius:10px;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;width:100%;}
  .subtask-add-btn:hover{background:var(--primary-light);}
  .proj-goal{font-size:12px;color:var(--primary-dark);background:var(--primary-light);border-radius:8px;padding:6px 12px;margin:0 14px 8px;line-height:1.5;}

  /* ④ 小タスク（サブアイテム） */
  .sub-items-wrap{padding:4px 0 2px 0;border-top:1px dashed #E5E7EB;margin-top:6px;}
  .sub-items-list{}
  .sub-item{display:flex;align-items:center;gap:6px;padding:4px 4px;border-radius:6px;font-size:12px;}
  .sub-item:hover{background:var(--bg);}
  .sub-item-handle{cursor:grab;color:#D1D5DB;font-size:13px;flex-shrink:0;padding:0 1px;touch-action:none;}
  .sub-item-handle:active{cursor:grabbing;}
  .sub-item input[type=checkbox]{accent-color:var(--primary);width:14px;height:14px;flex-shrink:0;cursor:pointer;}
  .sub-item-name{flex:1;color:var(--text);}
  .sub-item-name.done{text-decoration:line-through;color:var(--text-muted);}
  .sub-item-del{background:none;border:none;cursor:pointer;color:#D1D5DB;font-size:11px;padding:0 2px;line-height:1;flex-shrink:0;}
  .sub-item-del:hover{color:var(--danger);}
  .sub-item-add{display:flex;gap:6px;padding:4px 4px 2px;align-items:center;}
  .sub-item-add input{flex:1;border:1.5px dashed #D1D5DB;border-radius:8px;padding:5px 9px;font-size:12px;outline:none;background:transparent;font-family:inherit;color:var(--text);}
  .sub-item-add input:focus{border-color:var(--primary);border-style:solid;background:#fff;}
  .sub-item-add button{border:none;background:var(--primary-light);color:var(--primary);border-radius:8px;padding:5px 11px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;}
  .sub-item-add button:hover{background:var(--primary);color:#fff;}

  /* ① チームタスク概要 */
  .team-card{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:10px 12px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
  .team-row{display:flex;align-items:center;gap:10px;padding:8px 4px;border-bottom:1px solid #F5F5F5;}
  .team-row:last-child{border-bottom:none;}
  .team-avatar{width:34px;height:34px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;flex-shrink:0;}
  .team-info{flex:1;min-width:0;}
  .team-name{font-size:13px;font-weight:700;color:var(--text);margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .team-2col{display:flex;gap:6px;margin-top:6px;}
  .team-col{flex:1;min-width:0;border-radius:8px;padding:7px 10px;cursor:pointer;transition:filter .15s;}
  .team-col:hover{filter:brightness(.96);}
  .team-col-rt{background:#F0FDFA;border:1px solid var(--primary-light);}
  .team-col-rt.active{border-color:var(--primary);background:#E0FDF4;}
  .team-col-other{background:#F9FAFB;border:1px solid #E5E7EB;}
  .team-col-other.active{border-color:#6366F1;background:#EEF2FF;}
  .team-col-label{font-size:10px;font-weight:700;color:var(--text-muted);margin-bottom:3px;white-space:nowrap;}
  .team-col-num{font-size:22px;font-weight:800;line-height:1;margin-bottom:4px;}
  .team-col-num span{font-size:11px;font-weight:500;margin-left:2px;color:var(--text-muted);}
  .team-col-bar{height:5px;background:#E5E7EB;border-radius:3px;overflow:hidden;margin-top:2px;}
  .team-col-bar-fill{height:100%;border-radius:3px;transition:width .3s;}
  /* スタッフ展開タスクリスト */
  .staff-detail{background:#F8FFFE;border-left:3px solid var(--primary-light);border-radius:0 0 10px 10px;padding:4px 10px 10px 14px;margin-top:-4px;margin-bottom:4px;}
  .staff-sec-label{font-size:10px;font-weight:700;color:var(--primary-dark);text-transform:uppercase;letter-spacing:.05em;margin:8px 0 4px;display:flex;align-items:center;gap:4px;}
  .staff-sec-label:first-child{margin-top:6px;}
  .staff-task-row{display:flex;align-items:flex-start;gap:6px;padding:3px 2px;font-size:12px;color:var(--text);line-height:1.4;}
  .staff-task-row.done{opacity:.45;}
  .staff-task-row.done .staff-task-name{text-decoration:line-through;}
  .staff-task-icon{font-size:11px;flex-shrink:0;margin-top:1px;width:14px;text-align:center;}
  .staff-task-name{flex:1;word-break:break-word;}
  .staff-proj-tag{font-size:10px;background:var(--primary-light);color:var(--primary-dark);border-radius:5px;padding:1px 5px;margin-left:4px;font-weight:600;white-space:nowrap;flex-shrink:0;}
  .staff-empty{font-size:12px;color:var(--text-muted);padding:6px 0;}

  /* Goal cards (Tab 3) */
  .goal-card{background:var(--card);border-radius:12px;border:1px solid var(--border);margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.06);overflow:hidden;}
  .goal-card-header{display:flex;align-items:flex-start;gap:10px;padding:14px 14px 10px;}
  .goal-status-pill{height:26px;min-width:72px;padding:0 10px;border-radius:20px;border:1.5px solid #D1D5DB;background:#F9FAFB;color:#9CA3AF;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;gap:3px;white-space:nowrap;transition:all .15s;margin-top:1px;}
  .goal-status-pill::before{content:'○';font-size:11px;}
  .goal-status-pill.in-progress{border-color:var(--warn);background:#FEF3C7;color:#92400E;}
  .goal-status-pill.in-progress::before{content:'▶';color:var(--warn);}
  .goal-status-pill.achieved{border-color:var(--success);background:#D1FAE5;color:#065F46;}
  .goal-status-pill.achieved::before{content:'✓';color:var(--success);}
  .goal-text{font-size:15px;font-weight:600;flex:1;word-break:break-word;line-height:1.4;}
  .goal-text.achieved{text-decoration:line-through;opacity:.6;}
  .goal-progress-wrap{margin:0 14px 10px;display:flex;align-items:center;gap:8px;}
  .goal-progress-bar{flex:1;height:6px;background:#E5E7EB;border-radius:3px;overflow:hidden;}
  .goal-progress-fill{height:100%;background:var(--warn);border-radius:3px;transition:width .3s;}
  .goal-progress-fill.achieved{background:var(--success);}
  .goal-progress-pct{font-size:12px;font-weight:700;color:#92400E;min-width:32px;text-align:right;}
  .goal-progress-pct.achieved{color:#065F46;}
  .goal-meta{padding:0 14px 10px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
  .goal-linked-proj{font-size:12px;padding:3px 10px;background:var(--primary-light);color:var(--primary-dark);border-radius:8px;font-weight:600;}
  .goal-linked-proj .proj-pct{color:var(--primary);font-weight:700;}
  .goal-notes{font-size:12px;color:var(--text-muted);padding:0 14px 12px;line-height:1.5;}

  /* Empty */
  .empty-state{text-align:center;padding:32px 16px;color:var(--text-muted);}
  .empty-state .icon{font-size:36px;margin-bottom:10px;}
  .empty-state p{font-size:14px;}

  /* Prompt banner */
  .prompt-banner{background:#FEF3C7;border:1px solid #FDE68A;border-radius:10px;padding:12px 14px;margin-bottom:16px;font-size:13px;color:#92400E;display:flex;align-items:center;gap:8px;}
  .prompt-banner button{margin-left:auto;background:#F59E0B;border:none;color:#fff;padding:5px 12px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;}

  /* FAB */
  .fab{position:fixed;bottom:24px;right:20px;width:56px;height:56px;border-radius:28px;background:var(--primary);border:none;color:#fff;font-size:28px;cursor:pointer;box-shadow:0 4px 16px rgba(13,148,136,.4);display:flex;align-items:center;justify-content:center;z-index:200;transition:transform .15s,box-shadow .15s;}
  .fab:hover{transform:scale(1.07);}
  .fab:active{transform:scale(.95);}

  /* Modal */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;align-items:flex-end;justify-content:center;}
  .modal-overlay.open{display:flex;}
  .modal{background:#fff;border-radius:20px 20px 0 0;padding:20px 20px 32px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;}
  .modal h2{font-size:17px;font-weight:700;margin-bottom:16px;color:var(--text);}
  .field{margin-bottom:12px;}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em;}
  .field input,.field textarea,.field select{width:100%;padding:9px 12px;border:1.5px solid #E5E7EB;border-radius:10px;font-size:14px;color:var(--text);background:#fff;outline:none;font-family:inherit;transition:border-color .15s;}
  .field input:focus,.field textarea:focus,.field select:focus{border-color:var(--primary);}
  .field textarea{resize:vertical;min-height:64px;}
  .btn-row{display:flex;gap:10px;margin-top:16px;}
  .btn{flex:1;padding:11px;border-radius:10px;border:none;font-size:15px;font-weight:600;cursor:pointer;transition:all .15s;}
  .btn-primary{background:var(--primary);color:#fff;}
  .btn-primary:hover{background:var(--primary-dark);}
  .btn-danger{background:#FEE2E2;color:var(--danger);}
  .btn-ghost{background:#F3F4F6;color:var(--text-muted);}
  .modal-close{position:absolute;top:14px;right:14px;background:#F3F4F6;border:none;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}
  .modal-close:hover{background:#E5E7EB;}

  /* Settings */
  .settings-section{background:var(--bg);border-radius:12px;padding:14px;margin-bottom:12px;}
  .settings-section h3{font-size:13px;font-weight:700;color:var(--primary-dark);margin-bottom:10px;}
  .input-with-btn{display:flex;gap:8px;}
  .input-with-btn input,.input-with-btn select{flex:1;}
  .input-with-btn button{padding:9px 14px;border:none;border-radius:10px;background:var(--primary);color:#fff;font-size:13px;font-weight:600;cursor:pointer;white-space:nowraw;}

  /* Tag input */
  .tag-input-wrap{display:flex;flex-wrap:wrap;gap:5px;padding:7px 10px;border:1.5px solid #E5E7EB;border-radius:10px;min-height:44px;align-items:center;cursor:text;transition:border-color .15s;background:#fff;}
  .tag-input-wrap:focus-within{border-color:var(--primary);}
  .tag-input-wrap input{border:none;outline:none;font-size:14px;flex:1;min-width:90px;background:transparent;color:var(--text);font-family:inherit;padding:2px 0;}
  .tag-input-wrap input::placeholder{color:#9CA3AF;}
  .assignee-tag{display:inline-flex;align-items:center;gap:4px;background:#E0E7FF;color:#3730A3;padding:3px 8px;border-radius:12px;font-size:12px;font-weight:600;white-space:nowrap;}
  .assignee-tag-remove{background:none;border:none;cursor:pointer;color:#818CF8;font-size:13px;line-height:1;padding:0 0 0 2px;display:flex;align-items:center;}
  .assignee-tag-remove:hover{color:var(--danger);}

  /* Checkbox multi-select for goals */
  .proj-checklist{display:flex;flex-direction:column;gap:6px;padding:8px 0;}
  .proj-check-item{display:flex;align-items:center;gap:8px;font-size:14px;cursor:pointer;}
  .proj-check-item input[type=checkbox]{width:16px;height:16px;accent-color:var(--primary);}

  @media(min-width:640px){
    .modal-overlay{align-items:center;}
    .modal{border-radius:20px;margin:16px;}
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <h1>🏥 クリニック共有タスク</h1>
    <div class="header-actions">
      <span class="last-sync" id="lastSyncLabel"></span>
      <span class="sync-dot" id="syncDot" title="同期状態"></span>
      <button class="user-badge" onclick="openSettings()" id="userBadge">⚙ 設定</button>
    </div>
  </div>
  <div class="tabs">
    <button class="tab-btn active" id="tab-mytasks" onclick="switchTab('mytasks')">🏠 マイタスク</button>
    <button class="tab-btn" id="tab-projects" onclick="switchTab('projects')">📋 プロジェクト</button>
    <button class="tab-btn" id="tab-goals" onclick="switchTab('goals')">🎯 クリニック目標</button>
  </div>
</div>

<div class="main">
  <!-- Tab 1: マイタスク -->
  <div id="view-mytasks">
    <div id="myTasksBanner"></div>

    <!-- Block 1: 個人タスク -->
    <div class="section-title" onclick="toggleSection('myTasks')">
      <span class="sec-chevron" id="chevron-myTasks">▼</span>
      📌 自分のタスク

<script>
/* ═══════════════════════════════════════════
   DATA MODEL
════════════════════════════════════════════ */
const LS_KEY   = 'clinic_v3';
const LS_USER  = 'clinic_username';
const LS_ROLE  = 'clinic_userrole';

const EMPTY_DATA = {
  sharedTasks:    [],   // 個人タスク（担当者付き）
  generalRoutines:[],   // 共有ルーティン（誰でも）
  roleRoutines:   [],   // 職種別ルーティン
  projects:       [],   // プロジェクト
  goals:          [],   // クリニック大目標
  lastUpdated: '',
  lastUpdatedBy: ''
};

let data = Object.assign({}, EMPTY_DATA);
let userName = localStorage.getItem(LS_USER) || '';
let userRole  = localStorage.getItem(LS_ROLE)  || '';

let currentTab = 'mytasks';
let expandedProjects = new Set();
let completedVisible = {};
let projectCompletedVisible = {};
let subtaskSortables = {};
let myTaskSortable = null;
let sectionCollapsed = {}; // セクション折りたたみ状態
let staffExpandState = {}; // チーム概要：展開状態 name → 'routines' | 'other' | null

function toggleStaffSection(name, section) {
  staffExpandState[name] = (staffExpandState[name] === section) ? null : section;
  renderTeamOverview();
  applyAllSectionCollapse();
}

function toggleSection(key) {
  sectionCollapsed[key] = !sectionCollapsed[key];
  applyAllSectionCollapse();
}
function applyAllSectionCollapse() {
  const map = { myTasks:'myTaskList', generalRoutine:'generalRoutineList', roleRoutine:'roleRoutineList', team:'teamOverview' };
  Object.keys(map).forEach(function(key) {
    const el = document.getElementById(map[key]);
    const ch = document.getElementById('chevron-'+key);
    const collapsed = !!sectionCollapsed[key];
    if (el) { if(collapsed){el.classList.add('collapsed');}else{el.classList.remove('collapsed');} }
    if (ch) { ch.style.transform = collapsed ? 'rotate(-90deg)' : ''; }
  });
}

/* ════════════════════════════════════════════
   PERSISTENCE
════════════════════════════════════════════ */
function saveLocal() { localStorage.setItem(LS_KEY, JSON.stringify(data)); }

function loadLocal() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) data = Object.assign({}, EMPTY_DATA, JSON.parse(raw));
  } catch(e) {}
}

/* ═════════════════════════════════════════════
   FIREBASE
════════════════════════════════════════════ */
const firebaseConfig = {
  apiKey: "AIzaSyC8jFZftfOwfffOzOkMBFpneeGihpngZ-c",
  authDomain: "clinic-tasks.firebaseapp.com",
  databaseURL: "https://clinic-tasks-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "clinic-tasks",
  storageBucket: "clinic-tasks.firebasestorage.app",
  messagingSenderId: "1005151817378",
  appId: "1:1005151817378:web:537f9fde0d545f43c311fb"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const dataRef = db.ref('clinicData');

dataRef.on('value', function(snapshot) {
  const remote = snapshot.val();
  if (remote) {
    data = Object.assign({}, EMPTY_DATA, remote);
    autoResetRoutines(false);
    saveLocal();
    renderAll();
  }
  setSyncState('ok'); updateLastSyncLabel();
  const el = document.getElementById('syncStatus');
  if (el) el.textContent = '✅ Firebase に接続中（リアルタイム同期）';
}, function(error) {
  setSyncState('error');
  const el = document.getElementById('syncStatus');
  if (el) el.textContent = '❌ 接続エラー: ' + error.message;
});

function setSyncState(s) {
  const dot = document.getElementById('syncDot');
  dot.className = 'sync-dot' + (s==='syncing'?' syncing':s==='error'?' error':'');
}
function pushFirebase() {
  setSyncState('syncing');
  data.lastUpdated = new Date().toISOString();
  data.lastUpdatedBy = userName || '匿名';
  saveLocal();
  dataRef.set(data).then(function(){ setSyncState('ok'); updateLastSyncLabel(); })
    .catch(function(e){ setSyncState('error'); console.error(e); });
}
function updateLastSyncLabel() {
  if (!data.lastUpdated) return;
  const d = new Date(data.lastUpdated);
  const hm = d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
  document.getElementById('lastSyncLabel').textContent = hm + (data.lastUpdatedBy?' '+data.lastUpdatedBy:'');
}

/* ════════════════════════════════════════════
   AUTO-RESET ROUTINES
════════════════════════════════════════════ */
function weekKey(d){ const s=new Date(d); s.setDate(s.getDate()-s.getDay()); return s.getFullYear()+'-'+s.getMonth()+'-'+s.getDate(); }
function monthKey(d){ return d.getFullYear()+'-'+d.getMonth(); }

function needsReset(r) {
  if (!r.lastReset) return true;
  const now = new Date();
  const last = new Date(r.lastReset);
  if (r.frequency === 'weekly')  return weekKey(now)  !== weekKey(last);
  if (r.frequency === 'monthly') return monthKey(now) !== monthKey(last);
  return now.toDateString() !== last.toDateString(); // daily default
}

function autoResetRoutines(pushAfter) {
  let changed = false;
  const all = (data.generalRoutines||[]).concat(data.roleRoutines||[]);
  all.forEach(function(r) {
    if (needsReset(r)) {
      r.status = 'pending'; r.completedBy = ''; r.lastReset = new Date().toISOString();
      changed = true;
    }
  });
  if (changed && pushAfter) pushFirebase();
  return changed;
}

/* ════════════════════════════════════════════
   HELPERS
════════════════════════════════════════════ */
function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
const STATUS_CYCLE = { pending:'in-progress','in-progress':'completed',completed:'pending' };
const STATUS_LABEL = { pending:'未着手','in-progress':'進行中',completed:'完了' };
const PRIORITY_BADGE = { high:'badge-red',mid:'badge-yellow',low:'badge-blue' };
const PRIORITY_LABEL = { high:'高',mid:'中',low:'低' };
const FREQ_LABEL = { daily:'毎日',weekly:'週次',monthly:'月次' };

let currentAssignees = [];

function getAssigneesFromItem(item) {
  if (item.assignees && item.assignees.length) return item.assignees;
  if (item.assignee) return [item.assignee];
  return [];
}
function assigneeChipsHTML(item) {
  const names = getAssigneesFromItem(item);
  if (!names.length) return '<span class="badge badge-gray" style="font-size:11px">誰でも</span>';
  return names.map(function(n){ return '<span class="task-tag-assignee">👤 '+esc(n)+'</span>'; }).join('');
}
function renderAssigneeTags() {
  const wrap = document.getElementById('assigneeTagWrap'); if (!wrap) return;
  const inp = document.getElementById('assigneeInput');
  Array.from(wrap.children).forEach(function(ch){ if(ch!==inp) wrap.removeChild(ch); });
  currentAssignees.forEach(function(name,i){
    const tag = document.createElement('span');
    tag.className = 'assignee-tag';
    tag.innerHTML = '👤 '+esc(name)+'<button class="assignee-tag-remove" onclick="removeAssigneeTag('+i+')">✕</button>';
    wrap.insertBefore(tag, inp);
  });
}
function addAssigneeTag() {
  const inp = document.getElementById('assigneeInput'); if(!inp) return;
  // IME変換中は無視（日本語入力のEnter二重発火防止）
  if (inp._composing) return;
  const name = inp.value.trim();
  inp.value = '';
  if (name && currentAssignees.indexOf(name)===-1){
    currentAssignees.push(name);
    renderAssigneeTags();
  }
}
function removeAssigneeTag(i){ currentAssignees.splice(i,1); renderAssigneeTags(); }
function setAssignees(arr){
  currentAssignees = arr?arr.slice():[];
  renderAssigneeTags();
}
function clearAssigneeInput(){
  const inp = document.getElementById('assigneeInput');
  if (inp){ inp.value = ''; inp.blur(); }
}

function statusBtnHTML(status, onclick) {
  const s = status||'pending';
  const cls = s==='in-progress'?' in-progress':s==='completed'?' completed':'';
  return '<button class="status-btn'+cls+'" onclick="'+onclick+'">'+STATUS_LABEL[s]+'</button>';
}
function formatDate(str){ if(!str) return ''; const p=str.split('-'); return p[1]+'/'+p[2]; }
function isOverdue(d){ return d && new Date(d)<new Date(new Date().toDateString()); }
function dueBadgeClass(d){ return isOverdue(d)?'task-tag-overdue':'task-tag-due'; }
function esc(s){ return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''; }

/* ════════════════════════════════════════════
   TAB SWITCHING
════════════════════════════════════════════ */
function switchTab(tab) {
  currentTab = tab;
  ['mytasks','projects','goals'].forEach(function(t){
    document.getElementById('view-'+t).style.display = t===tab?'':'none';
    document.getElementById('tab-'+t).className = 'tab-btn'+(t===tab?' active':'');
  });
}

/* ════════════════════════════════════════════
   RENDER ALL
════════════════════════════════════════════ */
function renderAll() {
  renderMyTasksTab();
  renderProjectsTab();
  renderGoalsTab();
  updateLastSyncLabel();
  updateUserBadge();
}
function updateUserBadge(){
  const txt = userName ? '👤 '+userName+(userRole?' ('+userRole+')':'') : '⚙ 設定';
  document.getElementById('userBadge').textContent = txt;

/* ════════════════════════════════════════════
   TAB 1 — マイタスク
════════════════════════════════════════════ */
function renderMyTasksTab() {
  renderMyTasksBanner();
  renderMyTasksBlock();
  renderGeneralRoutines();
  renderRoleRoutines();
  renderTeamOverview();
  applyAllSectionCollapse();
}

/* ════════════════════════════════════════════
   ① チーム タスク概要
════════════════════════════════════════════ */
function renderTeamOverview() {
  const container = document.getElementById('teamOverview');
  if (!container) return;
  container.innerHTML = '';

  // 担当者ごとにタスクを集計（自分以外）
  const staffMap = {};
  function ensure(name) {
    if (!staffMap[name]) staffMap[name] = {
      personal:[], project:[], routines:[],
      rTotal:0, rDone:0, rInProg:0,
      otherTotal:0, otherDone:0
    };
  }
  function addPersonal(name, t) {
    if (!name || (userName && name===userName)) return;
    ensure(name);
    staffMap[name].personal.push(t);
    staffMap[name].otherTotal++;
    if (t.status==='completed') staffMap[name].otherDone++;
  }
  function addProject(name, st, projName) {
    if (!name || (userName && name===userName)) return;
    ensure(name);
    staffMap[name].project.push(Object.assign({}, st, {_projName: projName}));
    staffMap[name].otherTotal++;
    if (st.status==='completed') staffMap[name].otherDone++;
  }
  function addRoutine(name, r) {
    if (!name || (userName && name===userName)) return;
    ensure(name);
    if (staffMap[name].routines.find(function(x){return x.id===r.id;})) return; // dedup
    staffMap[name].routines.push(r);
    staffMap[name].rTotal++;
    if (r.status==='completed') staffMap[name].rDone++;
    else if (r.status==='in-progress') staffMap[name].rInProg++;
  }

  (data.sharedTasks || []).forEach(function(t) {
    getAssigneesFromItem(t).forEach(function(n) { addPersonal(n, t); });
  });
  (data.projects || []).forEach(function(proj) {
    (proj.subtasks || []).forEach(function(st) {
      getAssigneesFromItem(st).forEach(function(n) { addProject(n, st, proj.name); });
    });
  });
  // 毎日ルーティンを担当者別に集計
  var allRoutines = (data.generalRoutines||[]).concat(data.roleRoutines||[]);
  allRoutines.forEach(function(r) {
    var who = null;
    if (r.status==='completed' && r.completedBy) who = r.completedBy;
    else if (r.status==='in-progress' && r.inProgressBy) who = r.inProgressBy;
    else if (r.todayStaff) who = r.todayStaff;
    if (who) addRoutine(who, r);
  });

  const staff = Object.keys(staffMap);
  if (!staff.length) {
    container.innerHTML = '<div style="font-size:13px;color:var(--text-muted);padding:6px 4px 10px">他のスタッフの担当タスクはありません</div>';
    return;
  }

  // 残タスク多い順
  staff.sort(function(a, b) {
    var aAct = (staffMap[a].otherTotal-staffMap[a].otherDone)+(staffMap[a].rTotal-staffMap[a].rDone);
    var bAct = (staffMap[b].otherTotal-staffMap[b].otherDone)+(staffMap[b].rTotal-staffMap[b].rDone);
    return bAct - aAct;
  });

  const AVATAR_COLORS = ['#6366F1','#F59E0B','#EC4899','#8B5CF6','#14B8A6','#F97316','#3B82F6'];

  function loadColor(active) {
    if (active===0) return '#10B981';
    if (active<=2)  return '#0D9488';
    if (active<=5)  return '#F59E0B';
    return '#EF4444';
  }

  const card = document.createElement('div'); card.className = 'team-card';

  staff.forEach(function(name, i) {
    const info = staffMap[name];
    const pAct = info.personal.filter(function(t){return t.status!=='completed';}).length;
    const jAct = info.project.filter(function(t){return t.status!=='completed';}).length;
    const otherAct = pAct + jAct;
    const rRemain = info.rTotal - info.rDone;
    const ac = AVATAR_COLORS[i % AVATAR_COLORS.length];
    const expandedSection = staffExpandState[name] || null; // 'routines' | 'other' | null
    const rtExpanded    = expandedSection === 'routines';
    const otherExpanded = expandedSection === 'other';

    // スプリットバーの割合
    const rPct  = info.rTotal   > 0 ? Math.round(info.rDone/info.rTotal*100)        : 0;
    const oPct  = info.otherTotal > 0 ? Math.round(info.otherDone/info.otherTotal*100) : 0;
    const lcR = info.rTotal > 0 ? loadColor(rRemain) : '#10B981';
    const lcO = loadColor(otherAct);

    // ── サマリー行（クリックで展開） ──
    const row = document.createElement('div');
    row.className = 'team-row'; row.style.cursor = 'pointer';
    row.innerHTML =
      '<div class="team-avatar" style="background:'+ac+'">'+esc(name.charAt(0))+'</div>'+
      '<div class="team-info">'+
        '<div class="team-name">'+esc(name)+'</div>'+
        '<div class="team-2col">'+
          '<div class="team-col team-col-rt'+(rtExpanded?' active':'')+'">'+
            '<div class="team-col-label">🔄 毎日ルーティン <span style="float:right;font-size:9px">'+(rtExpanded?'▲':'▼')+'</span></div>'+
            '<div class="team-col-num" style="color:'+lcR+'">'+info.rDone+'<span>件完了</span></div>'+
            '<div class="team-col-bar"><div class="team-col-bar-fill" style="width:'+rPct+'%;background:'+lcR+'"></div></div>'+
            (info.rInProg>0?'<div style="font-size:10px;color:#F59E0B;margin-top:3px">▶ 進行中'+info.rInProg+'件</div>':'')+
          '</div>'+
          '<div class="team-col team-col-other'+(otherExpanded?' active':'')+'">'+
            '<div class="team-col-label">📋 ルーティン以外 <span style="float:right;font-size:9px">'+(otherExpanded?'▲':'▼')+'</span></div>'+
            '<div class="team-col-num" style="color:'+lcO+'">'+otherAct+'<span>件残</span></div>'+
            '<div class="team-col-bar"><div class="team-col-bar-fill" style="width:'+oPct+'%;background:'+lcO+'"></div></div>'+
          '</div>'+
        '</div>'+
      '</div>';
    // 左カラム・右カラムのクリックを独立で処理
    const rtCol    = row.querySelector('.team-col-rt');
    const otherCol = row.querySelector('.team-col-other');
    if (rtCol)    rtCol.onclick    = function(e){ e.stopPropagation(); toggleStaffSection(name,'routines'); };
    if (otherCol) otherCol.onclick = function(e){ e.stopPropagation(); toggleStaffSection(name,'other'); };
    card.appendChild(row);

    // ── 展開時：クリックしたカラムのタスクのみ表示 ──
    if (expandedSection) {
      const detail = document.createElement('div'); detail.className = 'staff-detail';

      function renderTaskGroup(label, tasks) {
        if (!tasks.length) return;
        const sec = document.createElement('div'); sec.className = 'staff-sec-label';
        sec.textContent = label; detail.appendChild(sec);
        const sorted = tasks.filter(function(t){return t.status!=='completed';})
          .concat(tasks.filter(function(t){return t.status==='completed';}));
        sorted.forEach(function(t) {
          const r = document.createElement('div');
          r.className = 'staff-task-row'+(t.status==='completed'?' done':'');
          const icon = t.status==='completed'?'✓':t.status==='in-progress'?'▶':'○';
          const projTag = t._projName
            ? '<span class="staff-proj-tag">'+esc(t._projName)+'</span>' : '';
          r.innerHTML =
            '<span class="staff-task-icon" style="color:'+(t.status==='completed'?'#10B981':t.status==='in-progress'?'#F59E0B':'#9CA3AF')+'">'+icon+'</span>'+
            '<span class="staff-task-name">'+esc(t.name)+projTag+'</span>';
          detail.appendChild(r);
        });
      }

      if (expandedSection === 'routines') {
        // 左カラムクリック：毎日ルーティンのみ
        renderTaskGroup('🔄 毎日ルーティン', info.routines);
        if (!info.routines.length) {
          const emp = document.createElement('div'); emp.className='staff-empty';
          emp.textContent='毎日ルーティンの担当なし'; detail.appendChild(emp);
        }
      } else if (expandedSection === 'other') {
        // 右カラムクリック：個人タスク＋プロジェクトのみ
        renderTaskGroup('📌 個人タスク', info.personal);
        renderTaskGroup('📋 プロジェクト', info.project);
        if (!info.personal.length && !info.project.length) {
          const emp = document.createElement('div'); emp.className='staff-empty';
          emp.textContent='ルーティン以外のタスクなし'; detail.appendChild(emp);
        }
      }

      card.appendChild(detail);
    }
  });

  container.appendChild(card);
}

function renderMyTasksBanner() {
  const el = document.getElementById('myTasksBanner');
  if (!userName || !userRole) {
    el.innerHTML = '<div class="prompt-banner">⚠️ '+(userName?'':'名前と')+(userRole?'':'職種を')+'設定してください — タスクの絞り込みと職種別ルーティンを表示するために必要です<button onclick="openSettings()">設定を開く</button></div>';
  } else {
    el.innerHTML = '';
  }
}

function getMyTasks() {
  const result = [];

  // ② sharedTasks: 自分が担当 or 担当者なし（userName未設定なら全件）
  (data.sharedTasks||[]).forEach(function(t){
    if (!userName) { result.push(Object.assign({}, t, {_src:'shared'})); return; }
    const names = getAssigneesFromItem(t);
    if (names.length===0 || names.indexOf(userName)!==-1) {
      result.push(Object.assign({}, t, {_src:'shared'}));
    }
  });

  // ③ プロジェクトのサブタスク: 自分が担当のものをリンク
  if (userName) {
    (data.projects||[]).forEach(function(proj){
      (proj.subtasks||[]).forEach(function(st){
        const names = getAssigneesFromItem(st);
        if (names.indexOf(userName)!==-1) {
          result.push(Object.assign({}, st, {
            _src: 'subtask',
            _projectId: proj.id,
            _projectName: proj.name
          }));
        }
      });
    });
  }
  return result;
}

function renderMyTasksBlock() {
  const container = document.getElementById('myTaskList');
  container.innerHTML = '';
  const label = document.getElementById('myTasksCountLabel');

  const tasks = getMyTasks();
  const active = tasks.filter(function(t){ return t.status!=='completed'; });
  const done   = tasks.filter(function(t){ return t.status==='completed'; });
  label.textContent = active.length+'件';

  if (tasks.length===0) {
    container.innerHTML = '<div class="card"><div style="padding:14px;text-align:center;color:var(--text-muted);font-size:13px">担当タスクがありません</div></div>';
    return;
  }

  const card = document.createElement('div'); card.className='card';

  // 個人タスク（sharedTasks）はドラッグ可、プロジェクトタスクはドラッグ不可で下に固定
  const sharedActive  = active.filter(function(t){ return t._src==='shared'; });
  const subtaskActive = active.filter(function(t){ return t._src==='subtask'; });

  const listEl = document.createElement('div');
  listEl.id = 'myTaskActiveList'; listEl.className='task-list';
  sharedActive.forEach(function(t){ listEl.appendChild(buildMyTaskItem(t)); });
  card.appendChild(listEl);

  // プロジェクト由来タスクは区切り線つきで追加（ドラッグなし）
  if (subtaskActive.length > 0) {
    const sep = document.createElement('div');
    sep.style.cssText='font-size:11px;font-weight:700;color:var(--primary-dark);padding:6px 14px 4px;border-top:1px dashed var(--border);text-transform:uppercase;letter-spacing:.05em;';
    sep.textContent='📋 プロジェクト担当タスク';
    card.appendChild(sep);
    const projListEl = document.createElement('div');
    projListEl.className='task-list'; projListEl.style.paddingTop='2px';
    subtaskActive.forEach(function(t){ projListEl.appendChild(buildMyTaskItem(t)); });
    card.appendChild(projListEl);
  }

  if (done.length>0) {
    const visKey='myTasks';
    if(completedVisible[visKey]===undefined) completedVisible[visKey]=false;
    const toggleBtn = document.createElement('button');
    toggleBtn.className='completed-toggle';
    toggleBtn.innerHTML='<span>'+(completedVisible[visKey]?'▲':'▼')+'</span> 完了済み '+done.length+'件';
    toggleBtn.onclick=function(){ completedVisible[visKey]=!completedVisible[visKey]; renderMyTasksBlock(); };
    card.appendChild(toggleBtn);
    const cs=document.createElement('div');
    cs.className='completed-section'+(completedVisible[visKey]?'':' hidden');
    cs.style.maxHeight=completedVisible[visKey]?(done.length*60+'px'):'0';
    done.forEach(function(t){ cs.appendChild(buildMyTaskItem(t)); });
    card.appendChild(cs);
  }
  container.appendChild(card);

  // sharedTasksのみドラッグ並び替え対応
  const activeEl = document.getElementById('myTaskActiveList');
  if (activeEl && sharedActive.length>0) {
    if (myTaskSortable) { try{myTaskSortable.destroy();}catch(e){} }
    myTaskSortable = Sortable.create(activeEl, {
      animation:200, delay:400, delayOnTouchOnly:true, handle:'.drag-handle',
      onEnd: function(evt){
        const act = (data.sharedTasks||[]).filter(function(t){ return t.status!=='completed'; });
        const comp = (data.sharedTasks||[]).filter(function(t){ return t.status==='completed'; });
        const moved = act.splice(evt.oldIndex,1)[0];
        act.splice(evt.newIndex,0,moved);
        data.sharedTasks = act.concat(comp);
        saveLocal(); pushFirebase(); renderMyTasksBlock();
      }
    });
  }
}

function buildMyTaskItem(t) {
  const item = document.createElement('div');
  item.className = 'task-item'+(t.status==='completed'?' completed':'');
  item.dataset.id = t.id;

  const isSubtask = t._src==='subtask';

  // タグ: プロジェクト由来ならプロジェクト名バッジ、個人タスクなら担当者チップ
  let tags = isSubtask
    ? '<span class="task-tag-project">📋 '+esc(t._projectName)+'</span>'
    : assigneeChipsHTML(t);
  if (t.priority) tags+='<span class="badge '+(PRIORITY_BADGE[t.priority]||'badge-gray')+'" style="font-size:11px">'+PRIORITY_LABEL[t.priority]+'</span>';
  if (t.dueDate)  tags+='<span class="'+dueBadgeClass(t.dueDate)+'">'+formatDate(t.dueDate)+'</span>';

  // ステータス更新・編集先をタスク種別で分岐
  const cycleCall = isSubtask
    ? "cycleSubtask('"+t._projectId+"','"+t.id+"')"
    : "cycleMyTask('"+t.id+"')";
  const editCall = isSubtask
    ? "openEditSubtask('"+t._projectId+"','"+t.id+"')"
    : "openEditMyTask('"+t.id+"')";

  item.innerHTML =
    (isSubtask ? '<span style="width:20px;flex-shrink:0"></span>' : '<span class="drag-handle">⠿</span>')+
    statusBtnHTML(t.status, cycleCall)+
    '<div class="task-body">'+
      '<div class="task-name">'+esc(t.name)+'</div>'+
      '<div class="task-tags">'+tags+'</div>'+
      (t.notes?'<div class="task-note">📝 '+esc(t.notes)+'</div>':'')+
    '</div>'+
    '<div class="task-actions"><button class="icon-btn" onclick="'+editCall+'" title="編集">✏️</button></div>';

  // ④ 小タスク（サブアイテム）を task-body 内に追加
  const taskBody = item.querySelector('.task-body');
  if (taskBody) {
    if (isSubtask) {
      taskBody.appendChild(buildSubItemsSection(t.subItems,
        function(name){ addSubItemToSubtask(t._projectId, t.id, name); },
        function(siId, done){ toggleSubItemInSubtask(t._projectId, t.id, siId, done); },
        function(siId){ deleteSubItemFromSubtask(t._projectId, t.id, siId); },
        function(oldIdx, newIdx){ reorderSubItemsInSubtask(t._projectId, t.id, oldIdx, newIdx); }
      ));
    } else {
      taskBody.appendChild(buildSubItemsSection(t.subItems,
        function(name){ addSubItemToSharedTask(t.id, name); },
        function(siId, done){ toggleSubItemInSharedTask(t.id, siId, done); },
        function(siId){ deleteSubItemFromSharedTask(t.id, siId); },
        function(oldIdx, newIdx){ reorderSubItemsInSharedTask(t.id, oldIdx, newIdx); }
      ));
    }
  }
  return item;
}

   BLOCK 2 — 共有ルーティン

function renderGeneralRoutines() {
  const container = document.getElementById('generalRoutineList');
  container.innerHTML = '';
  const routines = data.generalRoutines || [];

  if (routines.length===0) {
    container.innerHTML = '<div class="card"><div style="padding:14px;text-align:center;color:var(--text-muted);font-size:13px">共有ルーティンがありません</div></div>';
    return;
  }

  // Group by frequency
  const groups = { daily:[], weekly:[], monthly:[], '':[] };
  routines.forEach(function(r){ (groups[r.frequency||'daily']||groups['']).push(r); });

  ['daily','weekly','monthly'].forEach(function(freq){
    const list = groups[freq]||[];
    if (!list.length) return;
    const section = document.createElement('div');
    section.className = 'card'; section.style.marginBottom='12px';
    const hdr = document.createElement('div');
    hdr.style.cssText='padding:10px 14px 6px;font-size:12px;font-weight:700;color:var(--primary-dark);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;';
    const doneCount = list.filter(function(r){ return r.status==='completed'; }).length;
    hdr.innerHTML = '<span>'+FREQ_LABEL[freq]+' <span style="font-weight:400;color:var(--text-muted)">'+doneCount+'/'+list.length+'完了</span></span>';
    section.appendChild(hdr);
    const listEl = document.createElement('div');
    listEl.className='task-list'; listEl.style.paddingTop='6px';
    list.forEach(function(r){ listEl.appendChild(buildGeneralRoutineItem(r)); });
    section.appendChild(listEl);
    container.appendChild(section);
  });
}

function routineStaffBadge(r) {
  if (r.status==='completed' && r.completedBy)
    return '<span class="badge badge-green" style="font-size:11px">✓ '+esc(r.completedBy)+'</span>';
  if (r.status==='in-progress') {
    const who = r.inProgressBy || r.todayStaff;
    if (who) return '<span class="badge badge-yellow" style="font-size:11px">▶ '+esc(who)+'</span>';
  }
  if (r.todayStaff)
    return '<span class="badge badge-gray" style="font-size:11px">👤 '+esc(r.todayStaff)+'</span>';
  return '';
}

function buildGeneralRoutineItem(r) {
  const item = document.createElement('div');
  item.className = 'task-item'+(r.status==='completed'?' completed':'');
  let tags = '<span class="task-tag-routine">🔄 共有</span>';
  tags += '<span class="task-tag-freq">'+FREQ_LABEL[r.frequency||'daily']+'</span>';
  if (r.priority) tags+='<span class="badge '+(PRIORITY_BADGE[r.priority]||'badge-gray')+'" style="font-size:11px">'+PRIORITY_LABEL[r.priority]+'</span>';
  tags += routineStaffBadge(r);
  item.innerHTML =
    statusBtnHTML(r.status,"cycleGeneralRoutine('"+r.id+"')")+
    '<div class="task-body">'+
      '<div class="task-name">'+esc(r.name)+'</div>'+
      '<div class="task-tags">'+tags+'</div>'+
      (r.notes?'<div class="task-note">📝 '+esc(r.notes)+'</div>':'')+
    '</div>'+
    '<div class="task-actions"><button class="icon-btn" onclick="openEditGeneralRoutine(\''+r.id+'\')" title="編集">✏️</button></div>';
  return item;
}

function cycleGeneralRoutine(id) {
  const r = (data.generalRoutines||[]).find(function(x){ return x.id===id; });
  if (!r) return;
  r.status = STATUS_CYCLE[r.status||'pending'];
  if (r.status==='completed') { r.completedBy=userName||''; r.completedAt=new Date().toISOString(); r.inProgressBy=''; }
  else if (r.status==='in-progress') { r.inProgressBy=userName||''; r.completedBy=''; }
  else { r.completedBy=''; r.inProgressBy=''; }
  saveLocal(); pushFirebase(); renderGeneralRoutines();
}

   BLOCK 3 — 職種別ルーティン

function renderRoleRoutines() {
  const container = document.getElementById('roleRoutineList');
  const label = document.getElementById('roleRoutineLabel');
  container.innerHTML = '';

  const allRole = data.roleRoutines || [];

  if (!userRole) {
    // No role set — show all grouped by role
    label.textContent = '全職種';
    if (allRole.length===0) {
      container.innerHTML='<div class="card"><div style="padding:14px;text-align:center;color:var(--text-muted);font-size:13px">職種別ルーティンがありません</div></div>';
      return;
    }
    const byRole = {};
    allRole.forEach(function(r){ if(!byRole[r.role||'未設定']) byRole[r.role||'未設定']=[]; byRole[r.role||'未設定'].push(r); });
    Object.keys(byRole).forEach(function(role){
      const sec = buildRoleSection(role, byRole[role]); container.appendChild(sec);
    });
    return;
  }

  label.textContent = userRole+'のルーティン';
  const myRoles = allRole.filter(function(r){ return r.role===userRole || !r.role; });

  if (myRoles.length===0) {
    container.innerHTML='<div class="card"><div style="padding:14px;text-align:center;color:var(--text-muted);font-size:13px">'+userRole+'のルーティンがありません</div></div>';
    return;
  }

  // Group by frequency
  const groups = { daily:[], weekly:[], monthly:[] };
  myRoles.forEach(function(r){ (groups[r.frequency||'daily']).push(r); });
  ['daily','weekly','monthly'].forEach(function(freq){
    if (!groups[freq].length) return;
    const sec = buildRoleSection(FREQ_LABEL[freq], groups[freq]);
    container.appendChild(sec);
  });
}

function buildRoleSection(label, routines) {
  const sec = document.createElement('div'); sec.className='card'; sec.style.marginBottom='12px';
  const hdr = document.createElement('div');
  hdr.style.cssText='padding:10px 14px 6px;font-size:12px;font-weight:700;color:var(--primary-dark);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;';
  const doneCount = routines.filter(function(r){ return r.status==='completed'; }).length;
  hdr.innerHTML='<span>'+esc(label)+' <span style="font-weight:400;color:var(--text-muted)">'+doneCount+'/'+routines.length+'完了</span></span>';
  sec.appendChild(hdr);
  const listEl = document.createElement('div'); listEl.className='task-list'; listEl.style.paddingTop='6px';
  routines.forEach(function(r){ listEl.appendChild(buildRoleRoutineItem(r)); });
  sec.appendChild(listEl);
  return sec;
}

function buildRoleRoutineItem(r) {
  const item = document.createElement('div');
  item.className = 'task-item'+(r.status==='completed'?' completed':'');
  let tags = '<span class="task-tag-role">'+esc(r.role||'全職種')+'</span>';
  tags += '<span class="task-tag-freq">'+FREQ_LABEL[r.frequency||'daily']+'</span>';
  if (r.priority) tags+='<span class="badge '+(PRIORITY_BADGE[r.priority]||'badge-gray')+'" style="font-size:11px">'+PRIORITY_LABEL[r.priority]+'</span>';
  tags += routineStaffBadge(r);
  item.innerHTML =
    statusBtnHTML(r.status,"cycleRoleRoutine('"+r.id+"')")+
    '<div class="task-body">'+
      '<div class="task-name">'+esc(r.name)+'</div>'+
      '<div class="task-tags">'+tags+'</div>'+
      (r.notes?'<div class="task-note">📝 '+esc(r.notes)+'</div>':'')+
    '</div>'+
    '<div class="task-actions"><button class="icon-btn" onclick="openEditRoleRoutine(\''+r.id+'\')" title="編集">✏️</button></div>';
  return item;
}

function cycleRoleRoutine(id) {
  const r = (data.roleRoutines||[]).find(function(x){ return x.id===id; });
  if (!r) return;
  r.status = STATUS_CYCLE[r.status||'pending'];
  if (r.status==='completed') { r.completedBy=userName||''; r.completedAt=new Date().toISOString(); r.inProgressBy=''; }
  else if (r.status==='in-progress') { r.inProgressBy=userName||''; r.completedBy=''; }
  else { r.completedBy=''; r.inProgressBy=''; }
  saveLocal(); pushFirebase(); renderRoleRoutines();
}

function renderProjectsTab() {
  const container = document.getElementById('projectList');
  container.innerHTML = '';
  if (!data.projects || !data.projects.length) {
    container.innerHTML='<div class="empty-state"><div class="icon">📋</div><p>プロジェクトがありません — ＋ボタンで追加</p></div>';
    return;
  }
  const listEl = document.createElement('div');
  listEl.id = 'projectSortableList';
  data.projects.forEach(function(proj){ listEl.appendChild(buildProjectCard(proj)); });
  container.appendChild(listEl);
  Sortable.create(listEl,{
    animation:200, delay:400, delayOnTouchOnly:true, handle:'.proj-drag-handle',
    onEnd:function(evt){
      const moved=data.projects.splice(evt.oldIndex,1)[0];
      data.projects.splice(evt.newIndex,0,moved);
      saveLocal(); pushFirebase(); renderProjectsTab();
    }

}

function buildProjectCard(proj) {
  const subtasks = proj.subtasks||[];
  const active  = subtasks.filter(function(st){ return st.status!=='completed'; });
  const completed=subtasks.filter(function(st){ return st.status==='completed'; });
  const pct = subtasks.length>0?Math.round(completed.length/subtasks.length*100):0;
  const isExpanded = expandedProjects.has(proj.id);
  if (!projectCompletedVisible[proj.id]) projectCompletedVisible[proj.id]=false;

  const wrap = document.createElement('div'); wrap.className='card proj-card'; wrap.dataset.projId=proj.id;

  let titleBadges='';
  if (proj.leader) titleBadges+='<span class="badge badge-teal">👑 '+esc(proj.leader)+'</span>';
  if (proj.priority) titleBadges+='<span class="badge '+(PRIORITY_BADGE[proj.priority]||'badge-gray')+'">'+PRIORITY_LABEL[proj.priority]+'</span>';

/* ════════════════════════════════════════════
   ④ 小タスク（サブアイテム）
════════════════════════════════════════════ */
function buildSubItemsSection(subItems, onAdd, onToggle, onDelete, onReorder) {
  const items = subItems || [];
  const wrap = document.createElement('div'); wrap.className = 'sub-items-wrap';

  // 小タスク一覧（Sortable対象）
  const list = document.createElement('div'); list.className = 'sub-items-list';

  items.forEach(function(si) {
    const row = document.createElement('div'); row.className = 'sub-item'; row.dataset.id = si.id;
    const handle = document.createElement('span'); handle.className = 'sub-item-handle'; handle.textContent = '⠿';
    const cb = document.createElement('input'); cb.type = 'checkbox'; cb.checked = !!si.done;
    cb.onclick = function(e) { e.stopPropagation(); onToggle(si.id, cb.checked); };
    const name = document.createElement('span');
    name.className = 'sub-item-name' + (si.done ? ' done' : '');
    name.textContent = si.name;
    const del = document.createElement('button'); del.className = 'sub-item-del'; del.textContent = '✕';
    del.onclick = function(e) { e.stopPropagation(); onDelete(si.id); };
    row.appendChild(handle); row.appendChild(cb); row.appendChild(name); row.appendChild(del);
    list.appendChild(row);
  });
  wrap.appendChild(list);

  // 入力行（普通のタスクと同じEnterキー追加対応）
  const addRow = document.createElement('div'); addRow.className = 'sub-item-add';
  const inp = document.createElement('input'); inp.type = 'text'; inp.placeholder = '小タスクを入力 → Enter で追加';
  inp.addEventListener('compositionstart', function(){ inp._composing=true; });
  inp.addEventListener('compositionend',   function(){ inp._composing=false; });
  inp.addEventListener('keydown', function(e) {
    if (!inp._composing && e.key === 'Enter') { e.preventDefault(); doAdd(); }
  });
  const btn = document.createElement('button'); btn.textContent = '＋ 追加';
  btn.onclick = function(e) { e.stopPropagation(); doAdd(); };
  function doAdd() {
    const n = inp.value.trim(); if (!n) return;
    inp.value = ''; onAdd(n);
  }
  addRow.appendChild(inp); addRow.appendChild(btn);
  wrap.appendChild(addRow);

  // ドラッグ並び替え（Sortable）
  if (onReorder) {
    setTimeout(function() {
      if (!list.parentNode) return;
      Sortable.create(list, {
        animation: 150, delay: 300, delayOnTouchOnly: true, handle: '.sub-item-handle',
        onEnd: function(evt) {
          if (evt.oldIndex !== evt.newIndex) onReorder(evt.oldIndex, evt.newIndex);
        }
      });
    }, 0);
  }
  return wrap;
}

function reorderSubItemsInSharedTask(taskId, oldIdx, newIdx) {

}
function reorderSubItemsInSubtask(projectId, subtaskId, oldIdx, newIdx) {

  const st=(proj.subtasks||[]).find(function(s){return s.id===subtaskId;}); if(!st||!st.subItems) return;
  const moved=st.subItems.splice(oldIdx,1)[0]; st.subItems.splice(newIdx,0,moved);

}

════════════════════════════════════════════ */
function renderGoalsTab() {
  const container = document.getElementById('goalList');
  container.innerHTML = '';

  // Add button area
  const addBar = document.createElement('div');
  addBar.style.cssText='display:flex;justify-content:flex-end;margin-bottom:12px;';
  addBar.innerHTML='<button style="background:var(--primary);color:#fff;border:none;border-radius:10px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;" onclick="openAddGoal()">＋ 目標を追加</button>';
  container.appendChild(addBar);

  if (!data.goals || !data.goals.length) {
    container.innerHTML+='<div class="empty-state"><div class="icon">🎯</div><p>クリニックの大目標を設定しましょう</p></div>';
    return;
  }

  // 未着手・進行中を上に、完了を下に（ユーザーが並び替え可能）
  const active = (data.goals||[]).filter(function(g){ return g.status!=='achieved'; });
  const achieved= (data.goals||[]).filter(function(g){ return g.status==='achieved'; });

  const goalActiveList = document.createElement('div');
  goalActiveList.id = 'goalSortableList';
  active.forEach(function(g){ goalActiveList.appendChild(buildGoalCard(g)); });
  container.appendChild(goalActiveList);

  if (active.length > 1) {
    Sortable.create(goalActiveList, {
      animation: 200, delay: 400, delayOnTouchOnly: true, handle: '.goal-drag-handle',
      onEnd: function(evt) {
        const activeGoals = (data.goals||[]).filter(function(g){ return g.status!=='achieved'; });
        const achievedGoals = (data.goals||[]).filter(function(g){ return g.status==='achieved'; });
        const moved = activeGoals.splice(evt.oldIndex, 1)[0];
        activeGoals.splice(evt.newIndex, 0, moved);
        data.goals = activeGoals.concat(achievedGoals);
        saveLocal(); pushFirebase(); renderGoalsTab();
      }
    });
  }

  if (achieved.length>0) {
    const vk='goals_achieved';
    if(completedVisible[vk]===undefined) completedVisible[vk]=false;
    const tb=document.createElement('button'); tb.className='completed-toggle';
    tb.style.cssText='width:100%;background:var(--card);border:1px solid var(--border);border-radius:12px;margin-top:8px;';
    tb.innerHTML='<span>'+(completedVisible[vk]?'▲':'▼')+'</span> 達成済み目標 '+achieved.length+'件';
    tb.onclick=function(){ completedVisible[vk]=!completedVisible[vk]; renderGoalsTab(); };
    container.appendChild(tb);
    if (completedVisible[vk]) { achieved.forEach(function(g){ container.appendChild(buildGoalCard(g)); }); }
  }
}

const GOAL_STATUS_CYCLE = { pending:'in-progress', 'in-progress':'achieved', achieved:'pending' };
const GOAL_STATUS_LABEL = { pending:'未着手', 'in-progress':'進行中', achieved:'完了' };

function calcGoalProgress(g) {
  // リンクされたプロジェクトがあれば自動計算
  const ids = g.linkedProjectIds||[];
  const linked = ids.map(function(pid){ return (data.projects||[]).find(function(p){ return p.id===pid; }); }).filter(Boolean);
  if (linked.length > 0) {
    let totalTasks=0, doneTasks=0;
    linked.forEach(function(proj){
      const sub = proj.subtasks||[];
      totalTasks += sub.length;
      doneTasks  += sub.filter(function(s){ return s.status==='completed'; }).length;
    });
    return totalTasks>0 ? Math.round(doneTasks/totalTasks*100) : 0;
  }
  // 手動設定値
  return g.progress!=null ? parseInt(g.progress)||0 : 0;
}

function buildGoalCard(g) {
  const card = document.createElement('div'); card.className='goal-card';
  const status = g.status||'pending';
  const isAchieved = status==='achieved';
  const isProgress = status==='in-progress';
  const pct = calcGoalProgress(g);

  // ステータスピル
  const pillCls = isAchieved?' achieved': isProgress?' in-progress':'';
  let badgesHtml='';
  if (g.priority) badgesHtml+='<span class="badge '+(PRIORITY_BADGE[g.priority]||'badge-gray')+'">'+PRIORITY_LABEL[g.priority]+'</span>';
  if (g.deadline) badgesHtml+='<span class="badge '+(isOverdue(g.deadline)?'badge-red':'badge-gray')+'">期日 '+formatDate(g.deadline)+'</span>';

  const hdr=document.createElement('div'); hdr.className='goal-card-header';
  hdr.innerHTML=
    '<span class="drag-handle goal-drag-handle" style="font-size:18px;color:#9CA3AF;flex-shrink:0">⠿</span>'+
    '<button class="goal-status-pill'+pillCls+'" onclick="cycleGoalStatus(\''+g.id+'\')" title="クリックでステータス変更">'+
      GOAL_STATUS_LABEL[status]+
    '</button>'+
    '<div style="flex:1;min-width:0">'+
      '<div class="goal-text'+(isAchieved?' achieved':'')+'">'+esc(g.text)+'</div>'+
      (badgesHtml?'<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;">'+badgesHtml+'</div>':'')+
    '</div>'+
    '<button class="icon-btn" onclick="openEditGoal(\''+g.id+'\')" title="編集">✏️</button>';
  card.appendChild(hdr);

  // 進行中・完了のときプログレスバー表示
  if (isProgress || isAchieved) {
    const pw=document.createElement('div'); pw.className='goal-progress-wrap';
    pw.innerHTML=
      '<div class="goal-progress-bar"><div class="goal-progress-fill'+(isAchieved?' achieved':'')+'" style="width:'+pct+'%"></div></div>'+
      '<span class="goal-progress-pct'+(isAchieved?' achieved':'')+'">'+pct+'%</span>';
    card.appendChild(pw);
  }

  // リンクされたプロジェクト
  if (g.linkedProjectIds && g.linkedProjectIds.length) {
    const meta=document.createElement('div'); meta.className='goal-meta';
    g.linkedProjectIds.forEach(function(pid){
      const proj=(data.projects||[]).find(function(p){ return p.id===pid; });
      if (!proj) return;
      const sub=proj.subtasks||[];
      const done=sub.filter(function(s){ return s.status==='completed'; }).length;
      const pp=sub.length>0?Math.round(done/sub.length*100):0;
      const span=document.createElement('span'); span.className='goal-linked-proj';
      span.innerHTML='📋 '+esc(proj.name)+' <span class="proj-pct">'+pp+'%</span>';
      meta.appendChild(span);
    });
    card.appendChild(meta);
  }

  if (g.notes) {
    const notes=document.createElement('div'); notes.className='goal-notes';
    notes.textContent=g.notes; card.appendChild(notes);
  }
  return card;
}

function cycleGoalStatus(id) {
  const g=(data.goals||[]).find(function(x){ return x.id===id; });
  if (!g) return;
  g.status = GOAL_STATUS_CYCLE[g.status||'pending'];
  if (g.status==='achieved') g.achievedAt=new Date().toISOString();
  saveLocal(); pushFirebase(); renderGoalsTab();
}

/* ════════════════════════════════════════════
   STATUS CYCLES
════════════════════════════════════════════ */
function cycleMyTask(id) {
  const t=(data.sharedTasks||[]).find(function(x){ return x.id===id; });
  if (!t) return;
  t.status = STATUS_CYCLE[t.status||'pending'];
  if (t.status==='completed'){ t.completedAt=new Date().toISOString(); data.sharedTasks.splice(data.sharedTasks.indexOf(t),1); data.sharedTasks.push(t); }
  else { data.sharedTasks.splice(data.sharedTasks.indexOf(t),1); const fi=data.sharedTasks.findIndex(function(x){return x.status==='completed';}); fi===-1?data.sharedTasks.push(t):data.sharedTasks.splice(fi,0,t); }
  saveLocal(); pushFirebase(); renderMyTasksBlock();
}
function cycleSubtask(projectId, subtaskId) {
  const proj=(data.projects||[]).find(function(p){ return p.id===projectId; }); if(!proj) return;
  const st=(proj.subtasks||[]).find(function(s){ return s.id===subtaskId; }); if(!st) return;
  st.status=STATUS_CYCLE[st.status||'pending'];
  if(st.status==='completed'){ st.completedAt=new Date().toISOString(); proj.subtasks.splice(proj.subtasks.indexOf(st),1); proj.subtasks.push(st); }
  else { proj.subtasks.splice(proj.subtasks.indexOf(st),1); const fi=proj.subtasks.findIndex(function(x){return x.status==='completed';}); fi===-1?proj.subtasks.push(st):proj.subtasks.splice(fi,0,st); }
  saveLocal(); pushFirebase(); renderAll();
}

/* ════════════════════════════════════════════
   SAVE / DELETE TASK
════════════════════════════════════════════ */
function saveTask() {
  const type=document.getElementById('taskType').value;
  const name=document.getElementById('taskName').value.trim();
  if (!name){ document.getElementById('taskName').focus(); return; }
  const pendingInp=document.getElementById('assigneeInput');
  if (pendingInp && pendingInp.value.trim()) addAssigneeTag();
  const assignees=currentAssignees.slice();
  const priority=document.getElementById('taskPriority').value;
  const notes=document.getElementById('taskNotes').value.trim();

  if (type==='shared') {
    const dueDate=document.getElementById('taskDue').value;
    const id=document.getElementById('taskId').value;
    if (id) {
      const t=(data.sharedTasks||[]).find(function(x){ return x.id===id; });
      if(t){ t.name=name; t.assignees=assignees; t.assignee=''; t.priority=priority; t.dueDate=dueDate; t.notes=notes; }
    } else {
      if(!data.sharedTasks) data.sharedTasks=[];
      data.sharedTasks.push({id:uid(),name:name,assignees:assignees,priority:priority,dueDate:dueDate,notes:notes,status:'pending',createdAt:new Date().toISOString()});
    }
  } else if (type==='subtask') {
    const projId=document.getElementById('taskProjectId').value;
    const stId=document.getElementById('taskSubtaskId').value;
    const dueDate=document.getElementById('taskDue').value;
    const proj=(data.projects||[]).find(function(p){ return p.id===projId; }); if(!proj) return;
    if(!proj.subtasks) proj.subtasks=[];
    if(stId){ const st=proj.subtasks.find(function(s){return s.id===stId;}); if(st){st.name=name;st.assignees=assignees;st.assignee='';st.priority=priority;st.dueDate=dueDate;st.notes=notes;} }
    else proj.subtasks.push({id:uid(),name:name,assignees:assignees,priority:priority,dueDate:dueDate,notes:notes,status:'pending',createdAt:new Date().toISOString()});
  } else if (type==='generalRoutine') {
    const freq=document.getElementById('taskFrequency').value;
    const todayStaff=document.getElementById('taskTodayStaff').value.trim();
    const id=document.getElementById('taskId').value;
    if(!data.generalRoutines) data.generalRoutines=[];
    if(id){ const r=data.generalRoutines.find(function(x){return x.id===id;}); if(r){r.name=name;r.priority=priority;r.notes=notes;r.frequency=freq;r.todayStaff=todayStaff;} }
    else data.generalRoutines.push({id:uid(),name:name,frequency:freq,priority:priority,notes:notes,status:'pending',todayStaff:todayStaff,lastReset:new Date().toISOString(),createdAt:new Date().toISOString()});
  } else if (type==='roleRoutine') {
    const freq=document.getElementById('taskFrequency').value;
    const role=document.getElementById('taskRole').value;
    const todayStaff=document.getElementById('taskTodayStaff').value.trim();
    const id=document.getElementById('taskId').value;
    if(!data.roleRoutines) data.roleRoutines=[];
    if(id){ const r=data.roleRoutines.find(function(x){return x.id===id;}); if(r){r.name=name;r.priority=priority;r.notes=notes;r.frequency=freq;r.role=role;r.todayStaff=todayStaff;} }
    else data.roleRoutines.push({id:uid(),name:name,role:role,frequency:freq,priority:priority,notes:notes,status:'pending',lastReset:new Date().toISOString(),createdAt:new Date().toISOString()});
  }
  saveLocal(); pushFirebase(); closeModal('taskModal'); renderAll();
}

function deleteTask() {
  const type=document.getElementById('taskType').value;
  const id=document.getElementById('taskId').value;
  if (type==='shared') data.sharedTasks=(data.sharedTasks||[]).filter(function(x){return x.id!==id;});
  else if(type==='generalRoutine') data.generalRoutines=(data.generalRoutines||[]).filter(function(x){return x.id!==id;});
  else if(type==='roleRoutine') data.roleRoutines=(data.roleRoutines||[]).filter(function(x){return x.id!==id;});
  else if(type==='subtask'){
    const projId=document.getElementById('taskProjectId').value;
    const stId=document.getElementById('taskSubtaskId').value;
    const proj=(data.projects||[]).find(function(p){return p.id===projId;});
    if(proj) proj.subtasks=(proj.subtasks||[]).filter(function(s){return s.id!==stId;});
  }
  saveLocal(); pushFirebase(); closeModal('taskModal'); renderAll();
}

function renderGoalProjectChecklist(selected) {
  const cl=document.getElementById('goalProjectChecklist'); cl.innerHTML='';
  if (!data.projects||!data.projects.length){ cl.innerHTML='<div style="font-size:13px;color:var(--text-muted)">プロジェクトがありません</div>'; return; }
  data.projects.forEach(function(p){
    const label=document.createElement('label'); label.className='proj-check-item';
    const cb=document.createElement('input'); cb.type='checkbox'; cb.value=p.id;
    if(selected.indexOf(p.id)!==-1) cb.checked=true;
    cb.addEventListener('change', updateGoalProgressFieldVisibility);
    label.appendChild(cb);
    label.appendChild(document.createTextNode(p.name));
    cl.appendChild(label);
  });
}
function saveGoal() {
  const text=document.getElementById('goalText').value.trim(); if(!text){ document.getElementById('goalText').focus(); return; }
  const id=document.getElementById('goalId').value;
  const status=document.getElementById('goalStatus').value;
  const progress=document.getElementById('goalProgress').value!==''?parseInt(document.getElementById('goalProgress').value):null;
  const linkedIds=Array.from(document.querySelectorAll('#goalProjectChecklist input[type=checkbox]:checked')).map(function(cb){return cb.value;});
  const obj={text:text,status:status,progress:progress,priority:document.getElementById('goalPriority').value,deadline:document.getElementById('goalDeadline').value,notes:document.getElementById('goalNotes').value.trim(),linkedProjectIds:linkedIds};
  if(status==='achieved') obj.achievedAt=new Date().toISOString();
  if(id){ const g=(data.goals||[]).find(function(x){return x.id===id;}); if(g) Object.assign(g,obj); }
  else { if(!data.goals) data.goals=[]; data.goals.push(Object.assign({id:uid(),createdAt:new Date().toISOString()},obj)); }
  saveLocal(); pushFirebase(); closeModal('goalModal'); renderGoalsTab();
}
function deleteGoal() {
  const id=document.getElementById('goalId').value;
  data.goals=(data.goals||[]).filter(function(x){return x.id!==id;});
  saveLocal(); pushFirebase(); closeModal('goalModal'); renderGoalsTab();
}
